experiment:
  name: three-deme-example
  model: from_equilibrium

parameters:
  population_sizes: [300, 450, 350]
  selection_coefficients: [0.05, -0.02, -0.04]
  migration_matrix:
    - [-0.015, 0.010, 0.005]
    - [0.006, -0.014, 0.008]
    - [0.004, 0.006, -0.010]
  sep: 500
  replicates: 1000

sweeps:
  - target: selection_scale
    values: [0.5, 1.0, 1.5]
