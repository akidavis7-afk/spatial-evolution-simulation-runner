name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m multipop_runner validate configs/two_deme_migration_sweep.yml
      - run: python -m multipop_runner demo configs/two_deme_migration_sweep.yml --output-dir results/ci-demo
      - run: pytest -q
